<div id="mobile-drawer-backdrop"
  style="display:none;position:fixed;inset:0;z-index:148;background:rgba(0,0,0,0.5)"></div>

<div id="mobile-drawer"
  style="display:none;position:fixed;left:0;right:0;bottom:0;z-index:149;
    background:rgba(7,18,12,0.98);
    border:1px solid rgba(255,215,0,0.18);border-bottom:none;
    border-radius:20px 20px 0 0;
    backdrop-filter:blur(24px);
    max-height:85vh;overflow-y:auto;
    padding-bottom:calc(env(safe-area-inset-bottom,0px) + 0.75rem)">

  <!-- Handle -->
  <div class="sticky top-0 z-10 pt-3 pb-2" style="background:rgba(7,18,12,0.98)">
    <div class="drawer-handle"></div>
  </div>

  <!-- User strip -->
  <button id="drawer-user-strip"
    class="w-full flex items-center gap-3 px-4 py-3 text-left transition-all active:bg-white/[0.06] hover:bg-white/[0.03]">
    <div id="drawer-user-avatar">{{userAvatar}}</div>
    <div class="flex-1 min-w-0">
      <div class="font-ui text-sm text-white truncate" data-drawer-user-name>{{playerName}}</div>
      <div class="font-body text-[11px]" style="color:rgba(255,215,0,0.6)">{{playerElo}}</div>
    </div>
    <div class="flex items-center gap-2">
      <div id="drawer-notif-dot" class="w-[7px] h-[7px] rounded-full shrink-0" style="background:transparent"></div>
      <i data-lucide="chevron-right" style="width:14px;height:14px;color:rgba(255,255,255,0.25)"></i>
    </div>
  </button>

  <div style="height:1px;background:rgba(255,255,255,0.07);margin:4px 16px 8px"></div>

  <!-- Navigation links -->
  <nav class="px-3 pb-3 flex flex-col gap-0.5">
    {{navLinks}}
  </nav>
</div>

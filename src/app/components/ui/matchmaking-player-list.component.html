<div class="glass-card rounded-xl overflow-hidden">
  <!-- Header: title + TUTTI/NESSUNO buttons -->
  <div
    class="flex items-center justify-between px-4 md:px-5 py-3 bg-[rgba(10,25,18,0.8)] border-b border-[rgba(255,215,0,0.2)]">
    <div class="flex items-center gap-2">
      <i data-lucide="users" class="size-3.5 text-[var(--color-gold)]"></i>
      <span class="font-ui text-[13px] tracking-[0.1em] text-[var(--color-gold)]">DISPONIBILITA GIOCATORI</span>
    </div>
    <div class="flex items-center gap-2">
      <button id="confirmed-only-btn"
        class="font-ui px-2 py-1 rounded text-[10px] transition-colors hover:bg-white/10 tracking-[0.08em] text-white/50 border border-white/15">CONFERME</button>
      <button id="select-all-btn"
        class="font-ui px-2 py-1 rounded text-[10px] transition-colors hover:bg-white/10 tracking-[0.08em] text-white/50 border border-white/15">TUTTI</button>
      <button id="deselect-all-btn"
        class="font-ui px-2 py-1 rounded text-[10px] transition-colors hover:bg-white/10 tracking-[0.08em] text-white/50 border border-white/15">NESSUNO</button>
    </div>
  </div>

  <!-- Search -->
  <div class="px-4 md:px-5 py-2 bg-[rgba(10,25,18,0.5)] border-b border-white/5">
    <div class="relative">
      <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 size-[13px] text-white/30"></i>
      <input id="matchmaking-search" type="text" placeholder="Cerca giocatore…"
        class="w-full pl-9 pr-3 py-2 rounded-lg text-white placeholder:text-white/25 outline-none transition-all duration-200 bg-white/5 border border-white/10 focus:border-[rgba(255,215,0,0.3)] font-body text-[13px]" />
    </div>
  </div>

  <!-- Progress bar -->
  <div class="px-4 md:px-5 py-2 bg-[rgba(10,25,18,0.5)] border-b border-white/5">
    <div class="flex items-center justify-between mb-1.5">
      <span id="selected-count-label" class="font-ui text-[11px] text-white/50 tracking-[0.08em]">{{selectedCount}} /
        {{minPlayers}} SELEZIONATI</span>
      <span id="progress-status"
        class="font-ui text-[10px] tracking-[0.08em] {{progressStatusClass}}">{{progressStatus}}</span>
    </div>
    <div class="w-full h-1.5 rounded-full overflow-hidden bg-white/10">
      <div id="progress-fill" class="h-full rounded-full transition-all duration-500"
        style="width:{{progressPct}}%;background:{{progressFillStyle}}"></div>
    </div>
  </div>

  <!-- Live confirmations panel -->
  <div id="confirmations-panel"
    class="px-4 md:px-5 py-2 bg-[rgba(74,222,128,0.05)] border-b border-[rgba(74,222,128,0.15)]">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2">
        <i data-lucide="wifi" class="size-3 text-[#4ADE80]"></i>
        <span class="font-ui text-[11px] text-[#4ADE80] tracking-[0.08em]">CONFERME LIVE</span>
      </div>
      <span id="conf-count-badge"
        class="font-ui px-2 py-0.5 rounded-full text-[11px] text-[#4ADE80] bg-[rgba(74,222,128,0.15)] border border-[rgba(74,222,128,0.3)]">0</span>
    </div>
  </div>

  <div id="player-rows-container">{{playerRows}}</div>
</div>

<div class="min-h-screen">
  {{fieldBackground}}

  <div class="relative z-10 flex flex-col min-h-screen">
    <div id="app-header" class="sticky top-0 z-50">
      {{headerHtml}}
    </div>

    <main id="app-content" class="flex-1 overflow-hidden max-w-(--max-width) mx-auto w-full px-4 py-5 md:px-6 md:py-8 pb-[calc(3.5rem+env(safe-area-inset-bottom,0px))] md:pb-8">
    </main>

    <footer class="text-center py-3 px-4 pb-[calc(3.5rem+env(safe-area-inset-bottom,0px))] md:pb-4" style="border-top: 1px solid var(--color-gold-subtle)">
      <span class="font-ui" style="font-size: 10px; letter-spacing: 0.12em; color: var(--color-text-dim)">
        <bold>CA</bold>-LCIO BALILLA RATING SYSTEM · SHARK SEASON · v<span id="pwa-version">—</span>
      </span>
    </footer>
  </div>
</div>

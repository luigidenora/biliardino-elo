<div id="pull-refresh-shell" class="pull-refresh-shell" data-state="idle" aria-live="polite" aria-atomic="true">
  <div class="pull-refresh-surface glass-card-light">
    <div class="pull-refresh-progress">
      <span class="pull-refresh-progress-bar"></span>
    </div>

    <div class="pull-refresh-body">
      <div class="pull-refresh-badge" aria-hidden="true"></div>

      <div class="min-w-0">
        <div id="pull-refresh-label" class="pull-refresh-label font-ui">{{label}}</div>
        <div id="pull-refresh-hint" class="pull-refresh-hint font-body">{{hint}}</div>
      </div>
    </div>
  </div>
</div>
